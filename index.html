<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OSRS Bingo Dashboard</title>

<link rel="stylesheet" href="styles.css">

</head>


<body>


<!-- BACKGROUND LAYER -->

<div id="bg-layer">
    <div id="bg-particles"></div>
</div>



<div class="app">


    <div class="banner">

        <img 
            src="images/banner.png" 
            alt="OSRS Bingo Banner"
        >

    </div>




    <div class="dashboard">



        <!-- ================= TEAM CARDS ================= -->


        <div class="teams">


            <div class="team-card red">

                <div class="team-header">

                    <img id="team1img">

                    <h3 id="team1name"></h3>

                </div>


                <div>
                    <span id="score1">0</span> / 813
                </div>


                <div class="progress-container">

                    <div
                        class="progress-bar red"
                        id="bar1">
                    </div>

                </div>

            </div>





            <div class="team-card blue">

                <div class="team-header">

                    <img id="team2img">

                    <h3 id="team2name"></h3>

                </div>


                <div>
                    <span id="score2">0</span> / 813
                </div>


                <div class="progress-container">

                    <div
                        class="progress-bar blue"
                        id="bar2">
                    </div>

                </div>

            </div>





            <div class="team-card green">

                <div class="team-header">

                    <img id="team3img">

                    <h3 id="team3name"></h3>

                </div>


                <div>
                    <span id="score3">0</span> / 813
                </div>


                <div class="progress-container">

                    <div
                        class="progress-bar green"
                        id="bar3">
                    </div>

                </div>

            </div>


        </div>






        <!-- ================= BOARDS ================= -->


        <div class="boards">



            <!-- TEAM 1 -->

            <div class="board-wrapper">


                <div class="board-layout">


                    <div 
                        class="board"
                        id="board1">
                    </div>


                    <div class="bingo-side">

                        <div class="bingo-box" id="b1-r1">
                            BINGO
                        </div>

                        <div class="bingo-box" id="b1-r2">
                            BINGO
                        </div>

                        <div class="bingo-box" id="b1-r3">
                            BINGO
                        </div>

                        <div class="bingo-box" id="b1-r4">
                            BINGO
                        </div>

                        <div class="bingo-box" id="b1-r5">
                            BINGO
                        </div>

                    </div>


                </div>


                <div class="bingo-bottom">

                    <div class="bingo-box" id="b1-c1">
                        BINGO
                    </div>

                    <div class="bingo-box" id="b1-c2">
                        BINGO
                    </div>

                    <div class="bingo-box" id="b1-c3">
                        BINGO
                    </div>

                    <div class="bingo-box" id="b1-c4">
                        BINGO
                    </div>

                    <div class="bingo-box" id="b1-c5">
                        BINGO
                    </div>

                </div>


            </div>








            <!-- TEAM 2 -->


            <div class="board-wrapper">


                <div class="board-layout">


                    <div
                        class="board"
                        id="board2">
                    </div>


                    <div class="bingo-side">

                        <div class="bingo-box" id="b2-r1">BINGO</div>
                        <div class="bingo-box" id="b2-r2">BINGO</div>
                        <div class="bingo-box" id="b2-r3">BINGO</div>
                        <div class="bingo-box" id="b2-r4">BINGO</div>
                        <div class="bingo-box" id="b2-r5">BINGO</div>

                    </div>


                </div>



                <div class="bingo-bottom">

                    <div class="bingo-box" id="b2-c1">BINGO</div>
                    <div class="bingo-box" id="b2-c2">BINGO</div>
                    <div class="bingo-box" id="b2-c3">BINGO</div>
                    <div class="bingo-box" id="b2-c4">BINGO</div>
                    <div class="bingo-box" id="b2-c5">BINGO</div>

                </div>


            </div>








            <!-- TEAM 3 -->


            <div class="board-wrapper">


                <div class="board-layout">


                    <div
                        class="board"
                        id="board3">
                    </div>


                    <div class="bingo-side">

                        <div class="bingo-box" id="b3-r1">BINGO</div>
                        <div class="bingo-box" id="b3-r2">BINGO</div>
                        <div class="bingo-box" id="b3-r3">BINGO</div>
                        <div class="bingo-box" id="b3-r4">BINGO</div>
                        <div class="bingo-box" id="b3-r5">BINGO</div>

                    </div>


                </div>



                <div class="bingo-bottom">

                    <div class="bingo-box" id="b3-c1">BINGO</div>
                    <div class="bingo-box" id="b3-c2">BINGO</div>
                    <div class="bingo-box" id="b3-c3">BINGO</div>
                    <div class="bingo-box" id="b3-c4">BINGO</div>
                    <div class="bingo-box" id="b3-c5">BINGO</div>

                </div>


            </div>



        </div>









        <!-- ================= DROP LOG ================= -->


        <div class="drop-wrap">


            <div class="drop-title">
                Drop Log
            </div>



            <div class="drop-panel">


                <div class="drop-header">

                    <div>Time</div>

                    <div>Drop</div>

                    <div>Link</div>

                </div>



                <div
                    id="dropLog"
                    class="drop-log">
                </div>


            </div>


        </div>



    </div>


</div>





<div
    id="tooltip"
    class="tooltip">
</div>

<footer class="site-footer">
    <div>
        Made with ♥ by Sean for Kingdom
    </div>

    <div>
        <a href="https://discord.gg/kingdomclan" target="_blank">
            discord.gg/kingdomclan
        </a>
    </div>
</footer>




<!-- LOAD ORDER -->

<script src="config.js"></script>

<script src="data.js"></script>

<script src="app.js"></script>



</body>

</html>
